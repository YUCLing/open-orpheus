name: Build Bundles

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        required: true
        type: string
      ref:
        description: Git ref to checkout (defaults to caller's ref)
        required: false
        type: string
        default: ""

jobs:
  build:
    name: Build on ${{ inputs.runner }}
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm build:modules

      - name: Build application bundles
        run: pnpm make

      - name: Upload squirrel (installer)
        uses: actions/upload-artifact@v7
        with:
          name: squirrel-${{ inputs.runner }}
          path: out/make/squirrel.windows/**
          if-no-files-found: ignore

      - name: Upload zip (portable)
        uses: actions/upload-artifact@v7
        with:
          name: zip-${{ inputs.runner }}
          path: out/make/zip/**
          if-no-files-found: ignore
