name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.10.2)"
        required: true
      pre_release:
        description: "Mark as pre-release"
        type: boolean
        default: false
      discussion_category:
        description: "GitHub Discussions category name (omit to skip)"
        required: false
        type: string
        default: ""
      previous_tag:
        description: "Previous tag for release notes diff (e.g. v0.10.1, omit for auto)"
        required: false
        type: string
        default: ""
      skip_commit:
        description: "Skip the version-bump commit (use when already committed manually)"
        type: boolean
        default: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      commit-sha: ${{ steps.push.outputs.commit-sha }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in package.json
        if: ${{ !inputs.skip_commit }}
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

      - name: Clean up existing release if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          if gh release view "$TAG" --json isDraft -q '.isDraft' 2>/dev/null; then
            IS_DRAFT=$(gh release view "$TAG" --json isDraft -q '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Deleting existing draft release $TAG"
              gh release delete "$TAG" --yes
            else
              echo "::error::Release $TAG is already published. Aborting."
              exit 1
            fi
          else
            echo "No existing release found for $TAG, proceeding."
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --draft \
            --generate-notes \
            --title "v${{ inputs.version }}" \
            ${{ inputs.pre_release && '--prerelease' || '' }} \
            ${{ inputs.previous_tag && format('--notes-start-tag "{0}"', inputs.previous_tag) || '' }} \

      - name: Commit and push
        if: ${{ !inputs.skip_commit }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push origin main

      - name: Capture commit SHA
        id: push
        run: echo "commit-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    name: Build WOA (Windows on ARM64)
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      runner: windows-11-arm
      ref: ${{ needs.prepare.outputs.commit-sha }}

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
      actions: write

    steps:
      - name: Checkout for git context
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit-sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -name '*.exe' -o -name '*.zip' | while read f; do
            cp "$f" release-files/
          done

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ inputs.version }}" release-files/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ inputs.version }}" \
            --draft=false \
            ${{ inputs.pre_release && '--prerelease' || '' }} \
            ${{ inputs.discussion_category && format('--discussion-category "{0}"', inputs.discussion_category) || '' }}

  cleanup:
    name: Clean up draft release on failure
    needs: [prepare, build, publish]
    if: failure() || cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ inputs.version }}" --json isDraft -q '.isDraft' 2>/dev/null | grep -q true; then
            echo "Deleting draft release v${{ inputs.version }}"
            gh release delete "v${{ inputs.version }}" --yes
          fi
